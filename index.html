<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechTrend</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#FEFEFA] text-gray-800">

<!-- NAVBAR -->

<nav class="p-4 bg-[#FDFCF0] border-b flex justify-between items-center">
  <h1 class="text-2xl font-bold text-[#92A8D1] cursor-pointer" onclick="showPage('home')">TechTrend</h1>
  <div class="flex gap-4">
    <button onclick="showPage('products')">Produk</button>
    <button onclick="showPage('cart')">Cart (<span id="cart-count">0</span>)</button>
  </div>
</nav>

<!-- HOME -->

<section id="home" class="text-center py-16">
  <h2 class="text-4xl font-bold mb-4">Gadget Estetik Masa Kini</h2>
  <p class="mb-6">Upgrade gaya hidup digitalmu ✨</p>
  <button onclick="showPage('products')" class="bg-[#92A8D1] text-white px-6 py-3 rounded">Mulai Belanja</button>
</section>

<!-- PRODUCTS -->

<section id="products" class="hidden p-6 grid md:grid-cols-3 gap-6"></section>

<!-- CART -->

<section id="cart" class="hidden p-6">
  <h2 class="text-2xl font-bold mb-4">Keranjang</h2>
  <div id="cart-items"></div>
  <h3 class="mt-4 font-bold">Total: <span id="total"></span></h3>
  <button onclick="checkout()" class="mt-4 bg-green-500 text-white px-6 py-2 rounded">Checkout</button>
</section>

<!-- SUCCESS -->

<section id="success" class="hidden text-center py-20">
  <h2 class="text-3xl font-bold mb-4 text-green-600">Pesanan Berhasil 🎉</h2>
  <button onclick="showPage('home')" class="bg-[#92A8D1] text-white px-6 py-2 rounded">Kembali</button>
</section>

<script>
const products = [
  { id: 1, name: "Z-Phone Pro Max", price: 15000000 },
  { id: 2, name: "UltraBook Air 13", price: 12500000 },
  { id: 3, name: "SmartWatch G-7", price: 3200000 },
  { id: 4, name: "Tab Studio 11", price: 8900000 },
];

let cart = [];

function formatIDR(num){
  return "Rp " + num.toLocaleString("id-ID");
}

// NAVIGATION
function showPage(page){
  ["home","products","cart","success"].forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(page).classList.remove("hidden");

  if(page === "products") renderProducts();
  if(page === "cart") renderCart();
}

// PRODUCTS
function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="font-bold text-lg">${p.name}</h3>
        <p class="text-[#92A8D1] font-bold">${formatIDR(p.price)}</p>
        <button onclick="addToCart(${p.id})" class="mt-3 bg-[#92A8D1] text-white px-4 py-2 rounded">
          Beli
        </button>
      </div>
    `;
  });
}

// CART
function addToCart(id){
  const item = products.find(p => p.id === id);
  cart.push(item);
  document.getElementById("cart-count").innerText = cart.length;
}

function renderCart(){
  const container = document.getElementById("cart-items");
  container.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price;
    container.innerHTML += `
      <div class="flex justify-between border-b py-2">
        <span>${item.name}</span>
        <span>${formatIDR(item.price)}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = formatIDR(total);
}

// CHECKOUT
function checkout(){
  cart = [];
  document.getElementById("cart-count").innerText = 0;
  showPage("success");
}

// INIT
showPage("home");
</script>

</body>
</html>
